<html lang="id">
<head>

<style>
:root{--bg:#0f1117;--sf:#1a1d27;--sf2:#232736;--bd:#2d3248;--tw:#e8eaf0;--td:#8b90a5;--ac:#6366f1;--gn:#22c55e;--or:#f59e0b;--rd:#ef4444;--bl:#378ADD;--pu:#a855f7;--cy:#06b6d4}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tw)}
.app{max-width:1440px;margin:0 auto;padding:16px 20px}
.hdr{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);padding-bottom:12px;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.hdr h1{font-size:1.3rem;font-weight:800;background:linear-gradient(135deg,#6366f1,#06b6d4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr .sub{color:var(--td);font-size:.72rem;margin-top:2px}
.kpi-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;position:relative;overflow:hidden}
.kpi .bar{position:absolute;top:0;left:0;right:0;height:3px}.kpi .lb{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--td);margin-bottom:4px}
.kpi .vl{font-size:1.4rem;font-weight:800;font-family:'JetBrains Mono',monospace}.kpi .su{font-size:.6rem;color:var(--td);margin-top:2px}
.filt{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px 14px;margin-bottom:14px}
.filt h3{font-size:.68rem;font-weight:700;text-transform:uppercase;color:var(--td);margin-bottom:8px;display:flex;align-items:center;gap:5px}
.filt h3::before{content:'';display:inline-block;width:6px;height:6px;border-radius:2px;background:var(--ac)}
.fg{display:flex;gap:16px;flex-wrap:wrap}.fg>div{flex:1;min-width:140px}.fg label{display:block;font-size:.6rem;font-weight:600;color:var(--td);margin-bottom:5px;text-transform:uppercase}
.chips{display:flex;flex-wrap:wrap;gap:4px}.chip{padding:3px 9px;border-radius:6px;font-size:.64rem;font-weight:600;border:1px solid var(--bd);background:transparent;color:var(--td);cursor:pointer;transition:.2s;user-select:none}
.chip:hover{border-color:var(--ac);color:var(--tw)}.chip.on{background:var(--ac);border-color:var(--ac);color:#fff}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.cd{background:var(--sf);border:1px solid var(--bd);border-radius:10px;padding:12px}
.cd h3{font-size:.72rem;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:5px}.cd h3 .d{width:6px;height:6px;border-radius:50%;display:inline-block}
.cw{position:relative;width:100%;height:260px}
table{width:100%;border-collapse:collapse;font-size:10px}th{padding:5px 7px;text-align:center;color:var(--tw);font-weight:700;background:var(--sf2);border:1px solid var(--bd);font-size:9px;white-space:nowrap;position:sticky;top:0}
td{padding:4px 6px;border:1px solid var(--bd);font-size:10px;white-space:nowrap}.tbl-wrap{max-height:400px;overflow-y:auto;border-radius:8px;border:1px solid var(--bd)}
.st{padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700}.st-c{background:rgba(34,197,94,.15);color:var(--gn)}.st-p{background:rgba(55,138,221,.15);color:var(--bl)}
.st-pr{background:rgba(245,158,11,.15);color:var(--or)}.st-o{background:rgba(139,144,165,.15);color:var(--td)}.st-d{background:rgba(239,68,68,.15);color:var(--rd)}
.alert-ov{color:var(--rd);font-weight:700}.alert-ur{color:var(--or);font-weight:700}.alert-ok{color:var(--gn)}
@media(max-width:800px){.g2{grid-template-columns:1fr}.kpi-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
